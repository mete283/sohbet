<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webi-W | Global Sohbet</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sohbet Balonları İçin Ek Stiller */
        #chat-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            overflow-y: auto;
            background-color: #f9f9f9;
            border-radius: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }
        /* Başkalarının mesajı (Sola yaslı) */
        .other-msg {
            align-self: flex-start;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-bottom-left-radius: 2px;
        }
        /* Senin mesajın (Sağa yaslı) */
        .my-msg {
            align-self: flex-end;
            background-color: #2b457d;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .msg-sender {
            font-weight: bold;
            font-size: 11px;
            display: block;
            margin-bottom: 3px;
        }
        .verified-badge { width: 12px; margin-left: 3px; vertical-align: middle; }
    
    /* Global Chat'e özel genişlik ayarı */
.chat-card {
    width: 600px !important; /* Kartı genişletiyoruz */
    max-width: 95% !important; /* Mobilde taşmasın */
    height: 90vh; /* Ekranın çoğunu kaplasın */
    display: flex;
    flex-direction: column;
}

#chat-box {
    flex: 1; /* Mesaj alanının butonları aşağı itip tüm alanı kaplamasını sağlar */
    width: 100%;
    box-sizing: border-box;
}

.input-group {
    width: 100%;
    display: flex;
    gap: 10px;
}

    </style>
</head>
<body>
    <div id="chat-container" class="card chat-card" style="width: 450px;">
<div class="chat-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; padding: 0 5px;">
    <span style="font-size: 16px; font-weight: bold; white-space: nowrap;">🌍 𝙂𝙡𝙤𝙗𝙖𝙡 𝘾𝙝𝙖𝙩</span>
    <button onclick="window.location.href='index.html'" style="width: auto; background: #dc3545; padding: 6px 15px; font-size: 12px; margin: 0; flex-shrink: 0;">Ayrıl</button>
</div>
       
        <div id="chat-box" style="height: 450px; border: 1px solid #eee; margin: 10px 0;"></div>
        
        <div class="input-group" style="display: flex; gap: 5px;">
            <input type="text" id="global-message-input" placeholder="Mesajınızı yazın...">
            <button id="send-global-btn" style="width: 80px;">Gönder</button>
        </div>
    </div>

    <script type="module" src="canli.js"></script>
</body>
</html>
