<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazışma Web</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="background-blur"></div>

    <div id="login-container" class="glass-card">
        <h1>Hoşgeldin</h1>
        <div class="stats">Aktif Kullanıcı: <span id="user-count">0</span></div>
        <input type="text" id="username" placeholder="Takma Adın (Zorunlu)..." maxlength="15">
        
        <div class="filters">
            <p style="margin: 10px 0; font-size: 0.8rem; opacity: 0.7;">Mesaj Rengin</p>
            <select id="user-color" class="glass-input">
                <option value="#4facfe">Mavi</option>
                <option value="#a18cd1">Mor</option>
                <option value="#f78fb3">Pembe</option>
                <option value="#f093fb">Açık Mor</option>
                <option value="#48c6ef">Açık Mavi</option>
                <option value="#58ea30">Yeşil</option>
                <option value="#f0932b">Turuncu</option>
            </select>

            <p style="margin: 10px 0; font-size: 0.8rem; opacity: 0.7;">Cinsiyetin</p>
            <select id="gender" class="glass-input">
                <option value="Belirtilmedi">Belirtmek İstemiyorum</option>
                <option value="Erkek">Erkek</option>
                <option value="Kız">Kız</option>
            </select>

            <p style="margin: 10px 0; font-size: 0.8rem; opacity: 0.7;">Filtreler (Öncelik)</p>
            <input type="number" id="age" placeholder="Yaş">
            <input type="text" id="horoscope" placeholder="Burç">
            <input type="number" id="height" placeholder="Boy">
        </div>
        <button id="start-btn">Sohbete Başla</button>
    </div>

    <div id="chat-container" class="glass-card hidden">
        <div class="chat-header">
            <button id="back-to-menu" class="small-btn">Menü</button>
            <span id="partner-info" style="font-size: 0.9rem; font-weight: bold;">Eşleşme aranıyor...</span>
            <button id="next-btn" class="next-btn">Geç</button>
        </div>
        <div id="messages"></div>
        <div class="input-area" style="display:flex; gap:5px;">
            <input type="text" id="msg-input" placeholder="Mesajını yaz..." style="margin:0;">
            <button id="send-btn" style="margin:0; width:auto; padding:0 15px;">></button>
        </div>
    </div>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
