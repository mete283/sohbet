<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bilinmeyem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blur"></div>

    <div id="login-container" class="glass-card">
        <h1>Hoşgeldin</h1>
        <div class="stats">Aktif: <span id="user-count">0</span></div>
        
        <input type="text" id="username" placeholder="Takma Adın... (zorunlu)" maxlength="15">
        
        <div class="selection-group">
            <p style="margin-top:10px; font-size:0.8rem;">Yaşın (zorunlu)</p>
            <input type="number" id="user-age" placeholder="Yaş..." min="13" max="99" class="glass-input">

            <p style="margin-top:10px; font-size:0.8rem;">Cinsiyetin (zorunlu değil)</p>
            <select id="gender" class="glass-input">
                <option value="Belirtilmedi">Belirtmek İstemiyorum</option>
                <option value="Erkek">Erkek</option>
                <option value="Kız">Kız</option>
            </select>

            <p style="margin-top:10px; font-size:0.8rem;">Mesaj Rengin (zorunlu degil)</p>
            <select id="user-color" class="glass-input">
                <option value="#4facfe">Mavi</option>
                <option value="#a18cd1">Mor</option>
                <option value="#f78fb3">Pembe</option>
                <option value="#58ea30">Yeşil</option>
                <option value="#f0932b">Turuncu</option>
            </select>
        </div>

        <button id="start-btn">Sohbete Başla</button>
    </div>

    <div id="chat-container" class="glass-card hidden">
        <div class="chat-header">
            <button id="back-to-menu" class="small-btn">Çık</button>
            <span id="partner-info">Bağlanılıyor...</span>
            <button id="next-btn" class="next-btn">Geç</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Mesaj yaz...">
            <button id="send-btn">></button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
