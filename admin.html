<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sohbet Web - Yönetim Paneli</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-card { width: 500px; margin: 20px auto; }
        .control-group { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff; }
        label { display: block; text-align: left; font-weight: bold; margin-bottom: 5px; color: #2b457d; }
        .admin-chat-area { display: none; margin-top: 20px; border-top: 2px solid #2b457d; padding-top: 20px; }
        .verified-badge { color: #1da1f2; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="card admin-card">
        <h2>Yönetim Paneli</h2>
        
        <div class="control-group">
            <label>Oda ve Kullanıcı Yönetimi</label>
            <input type="text" id="target-room" placeholder="Oda Kodu">
            <input type="text" id="target-user" placeholder="Kullanıcı Adı">
            <input type="number" id="mute-time" placeholder="Süre (Dakika)">
            <div style="display: flex; gap: 10px;">
                <button onclick="adminMute()" style="background: #f39c12;">Sustur</button>
                <button onclick="adminCloseRoom()" style="background: #dc3545;">Odayı Kapat</button>
            </div>
        </div>

        <div class="control-group">
            <label>Sohbete Admin Olarak Katıl</label>
            <input type="text" id="admin-name" placeholder="Admin Adınız (Örn: Mete)">
            <button onclick="joinAsAdmin()" style="background: #2b457d;">Sohbeti İzle ve Yaz</button>
        </div>

        <div id="admin-chat-container" class="admin-chat-area">
            <div id="chat-box" style="height: 300px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #eee; padding: 10px;"></div>
            <div class="input-group">
                <input type="text" id="admin-message-input" placeholder="Admin mesajı gönder...">
                <button onclick="sendAdminMessage()" style="width: auto;">Gönder</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
